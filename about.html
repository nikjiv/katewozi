<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>about — kate wozi</title>
  <meta name="description" content="about kate wozi" />

  <meta property="og:title" content="about — kate wozi" />
  <meta property="og:description" content="about kate wozi" />
  <meta property="og:image" content="https://katewozi.com/images/hero-desktop.webp" />
  <meta property="og:url" content="https://katewozi.com/about" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="about — kate wozi" />
  <meta name="twitter:description" content="about kate wozi" />
  <meta name="twitter:image" content="https://katewozi.com/images/hero-desktop.webp" />

  <link rel="icon" href="/favicon.ico" />

  <link rel="preload" as="image" href="/images/about-desktop.webp" media="(min-width: 769px)" />
  <link rel="preload" as="image" href="/images/about.webp" media="(max-width: 768px)" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&display=swap" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: "Tangerine", cursive;
      min-height: 100vh;
    }

    .nav-link {
      position: fixed;
      top: 1.5rem;
      left: 1.75rem;
      z-index: 10;
      font-family: "Tangerine", cursive;
      font-weight: 700;
      font-size: 1.5rem;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      transition: color 300ms ease;
    }

    .nav-link:hover,
    .nav-link:focus-visible { color: #fff; outline: none; }

    .about {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .about-image {
      width: min(100vw, calc(100dvh * 9 / 16));
      aspect-ratio: 9 / 16;
      background: #1a1a1a;
    }

    @media (min-width: 769px) {
      .about-image {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        aspect-ratio: auto;
      }
    }

    .about-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 800ms ease-in;
    }

    .about-image img.loaded { opacity: 1; }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 768px) {
      .nav-link { top: 1.25rem; left: 1.25rem; font-size: 1.375rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .about-image img { transition: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <a href="/" class="nav-link">← back</a>

  <main class="about">
    <h1 class="visually-hidden">about</h1>
    <div class="about-image">
      <picture>
        <source srcset="/images/about-desktop.webp" media="(min-width: 769px)" />
        <img src="/images/about.webp" alt="Kate Wozi" decoding="async" />
      </picture>
    </div>
  </main>

  <script>
    (function () {
      var img = document.querySelector('.about-image img');
      if (!img) return;
      if (img.complete && img.naturalWidth > 0) {
        img.classList.add('loaded');
      } else {
        img.addEventListener('load',  function () { img.classList.add('loaded'); });
        img.addEventListener('error', function () { img.classList.add('loaded'); });
      }
    })();
  </script>
</body>
</html>
